- node: SetVariable
  params:
    name: template_path
    value: "pipeline/templates/artcabbage_article_template.htm"
    if_missing: true

- node: SetVariable
  params:
    name: article_output_path
    value: "./cache/artcabbage/${article_name}/article_draft.txt"

- node: SetVariable
  params:
    name: csv_output_path
    value: "./cache/artcabbage/${article_name}/article_metadata.csv"

- node: SetVariable
  params:
    name: seo_output_path
    value: "./cache/artcabbage/${article_name}/seo_ldjson_meta.txt"

- node: SetVariable
  params:
    name: html_output_path
    value: "./cache/artcabbage/${article_name}/article.html"

- node: SetVariable
  params:
    name: additional_info
    value: ""

- node: SetVariable
  params:
    name: platform_info
    value: |
      <meta property="og:site_name" content="ArtCabbage">
      <meta property="fb:app_id" content="195655606875833" />
      "@type": "WebSite",
      "url": "https://artcabbage.com/",
      "name": "ArtCabbage",
      "alternateName": "Art Cabbage"
      "@type": "Organization",
      "name": "ArtCabbage",
      "url": "https://www.artcabbage.com",
      "logo": "https://artcabbage.com/assets/artcabbage_logo.png",
      "description": "Discover ArtCabbage: your global platform for all things art! As a hub for art, cinema, literature, fashion, and performing arts, ArtCabbage celebrates and promotes creative expression, offering a platform for artists and creators to publish and engage with an international audience.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer service",
        "email": "info@artcabbage.com"
      },
      "sameAs": [
        "https://www.facebook.com/ArtCabbage.mag/",
        "https://twitter.com/ArtCabbage_mag",
        "https://www.instagram.com/artcabbage.magazine"
      ]

- node: SetVariable
  params:
    name: prompt_step_1
    value: "Describe the images as you are an art critique."

- node: GPTChat
  params:
    model: gpt-4o-mini
    max_tokens: 1200
    prompt:
      - type: text
        content: prompt_step_1
      - type: image
        content: images_path
        detailed: true
    chat_history: article_workflow_history
    output: images_critique

- node: SetVariable
  params:
    name: prompt_step_2
    value: |
      Now we’ll write an article about the artist and their art for a major online art magazine.
      It must be no less than 700 words, use additional info I provided, include art pieces descriptions and musings (the images will be included in the article).
      Don't sound like a generative article; make it like some popular platform would write.
      Additional info:
      ${additional_info}

      Art critique notes from previous step:
      ${images_critique}

      Return only the article text (no markdown fence).

- node: GPTChat
  params:
    model: gpt-4o-mini
    max_tokens: 3500
    prompt:
      - type: text
        content: prompt_step_2
    chat_history: article_workflow_history
    output: article_draft

- node: WriteFile
  params:
    file_path: ${article_output_path}
    input: article_draft

- node: SetVariable
  params:
    name: prompt_step_3
    value: |
      Please make a CSV table with columns exactly in this order:
      page_name,cover_image_alt,remaining_images_alt,page_title,description

      Rules:
      - page_name format example: gallery-exhibition-tips
      - cover_image_alt: brief topic + include word ArtCabbage
      - remaining_images_alt: different alt texts for all remaining images; keep all in one cell separated by " | "
      - page_title must contain the artist name
      - description is for Google/social sharing cards
      - return CSV only, no markdown fence, no explanation

      Use this article draft:
      ${article_draft}

- node: GPTChat
  params:
    model: gpt-4o-mini
    max_tokens: 1200
    prompt:
      - type: text
        content: prompt_step_3
    chat_history: article_workflow_history
    output: article_meta_csv

- node: WriteFile
  params:
    file_path: ${csv_output_path}
    input: article_meta_csv

- node: SetVariable
  params:
    name: prompt_step_4
    value: |
      Make JSON-LD and meta tags for the webpage of this article.
      Requirements:
      - clear topic in tags
      - include artist name
      - include images
      - article author is ArtCabbage (organisation)
      - include OpenGraph/Twitter-friendly tags
      - return plain text blocks only (no markdown fence)

      Platform info:
      ${platform_info}

      Article:
      ${article_draft}

      Metadata CSV:
      ${article_meta_csv}

- node: GPTChat
  params:
    model: gpt-4o-mini
    max_tokens: 2200
    prompt:
      - type: text
        content: prompt_step_4
    chat_history: article_workflow_history
    output: article_seo_ldjson_meta

- node: WriteFile
  params:
    file_path: ${seo_output_path}
    input: article_seo_ldjson_meta

- node: ReadFile
  params:
    file_path: ${template_path}
    output: html_template

- node: SetVariable
  params:
    name: prompt_step_5
    value: |
      Convert the article draft into an HTML fragment that will be inserted into this template:
      ${template_path}

      Important:
      - Return only the fragment that goes between:
        <!--Paste from here-->
        <!--Paste to here-->
      - Do not return <html>, <head>, <body>, or outer layout wrappers
      - Keep ArtCabbage classes and style conventions

      Style sample:
      <h1 class="article_heading">Title</h1>
      <time class="publishdate" itemprop="datePublished" content="2025-03-28">March 28, 2025</time>
      <picture><img class="img_article" src="/images/ai-art-is-dead.png" alt="AI art and human artist resurgence 2025 – ArtCabbage"></picture>
      <div itemprop="articleBody">
        <p class="article_text">Paragraph</p>
        <h2 class="subheading_article">Subheading</h2>
        <p class="article_text">You can find out more on the artist <a class="external-link" href="https://www.instagram.com/rafooart/" rel="nofollow" itemprop="url">Instagram.</a></p>
      </div>

      Include:
      - article body from draft
      - image tags that can map to files in ${images_path}
      - proper alt texts based on generated CSV metadata

      Return only the HTML fragment, no markdown fence.

      Article:
      ${article_draft}

      CSV metadata:
      ${article_meta_csv}

      SEO tags and JSON-LD:
      ${article_seo_ldjson_meta}

- node: GPTChat
  params:
    model: gpt-4o-mini
    max_tokens: 4000
    prompt:
      - type: text
        content: prompt_step_5
    chat_history: article_workflow_history
    output: article_html_fragment

- node: ReplaceBetween
  params:
    input: html_template
    output: article_html
    start_marker: "<!--Paste from here-->"
    end_marker: "<!--Paste to here-->"
    replacement: article_html_fragment

- node: WriteFile
  params:
    file_path: ${html_output_path}
    input: article_html

- node: PrintVariable
  params:
    input: html_output_path
