- node: SetVariable
  params:
    name: source_text
    value: "hello from test pipeline"

- node: CopyVariable
  params:
    input: source_text
    output: copied_text

- node: WriteFile
  params:
    file_path: "./cache/test_output.txt"
    input: copied_text

- node: ReadFile
  params:
    filepath: "./cache/test_output.txt"
    output: loaded_text

- node: PrintVariable
  params:
    input: loaded_text
